name: CI
on: [push, pull_request]
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      python-version: "3.12.x"
    services:
      valkey:
        image: valkey/valkey:8.0-alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ureport
          POSTGRES_USER: ureport
          POSTGRES_PASSWORD: nyaruka
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Install Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.python-version }}

    - name: Initialize environment
      run: |
        uv venv
        uv sync --all-groups
        sudo npm install -g coffeescript less
        ln -s ${{ github.workspace }}/ureport/settings.py.postgres ${{ github.workspace }}/ureport/settings.py

        uv pip show smartmin | awk '/Location:/ { print $2 "/smartmin  ${{ github.workspace }}/smartmin" }' | xargs ln -s
        uv pip show rapidpro-dash | awk '/Location:/ { print $2 "/dash ${{ github.workspace }}/dash" }' | xargs ln -s

    - name: Run pre-test checks
      run: |
        sudo apt-get install gettext
        uv run ./code_check.py --debug

    - name: Run tests
      run: |
        uv run coverage run manage.py test --verbosity=2 --noinput
        uv run coverage xml

    - name: Upload coverage
      if: success()
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: true
